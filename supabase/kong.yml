_format_version: '2.1'

services:
  - name: auth
    url: http://auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1
        plugins:
          - name: cors
            config:
              origins:
                - 'https://adam.bytecrafts.in'
              methods:
                - GET
                - POST
                - OPTIONS
                - PUT
                - PATCH
                - DELETE
              headers:
                - Authorization
                - Content-Type
                - Accept
                - Origin
                - X-Requested-With
                - x-supabase-api-version
                - x-client-info
                - apikey
              exposed_headers:
                - Authorization
              credentials: true
              max_age: 86400

  - name: rest
    url: http://rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1

  - name: realtime
    url: http://realtime:4000
    routes:
      - name: realtime-route
        paths:
          - /realtime/v1

  - name: storage
    url: http://storage:5000
    routes:
      - name: storage-route
        paths:
          - /storage/v1
